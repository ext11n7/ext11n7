<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F0FDF4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="260" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#065F46"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="line" x1="840" y1="64" x2="1142" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#047857"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="blur" x="862" y="36" width="342" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <style>
      .shift { animation: shift 8s ease-in-out infinite; transform-origin: center; }
      .pulse { animation: pulse 6s ease-in-out infinite; }
      .draw { stroke-dasharray: 560; stroke-dashoffset: 560; animation: draw 2s ease forwards; }
      @keyframes shift {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <rect width="1280" height="360" rx="32" fill="url(#bg)"/>
  <rect x="26" y="26" width="1228" height="308" rx="26" fill="#FFFEFC" stroke="#D1FAE5"/>

  <g opacity="0.95">
    <circle cx="1020" cy="108" r="92" fill="#DCFCE7" class="shift"/>
    <circle cx="1110" cy="216" r="48" fill="#BBF7D0" class="pulse"/>
  </g>

  <g filter="url(#blur)" opacity="0.55">
    <ellipse cx="1032" cy="176" rx="116" ry="82" fill="#A7F3D0"/>
  </g>

  <text x="128" y="132" fill="#065F46" font-family="'Segoe UI', Arial, sans-serif" font-size="18" letter-spacing="4">DATA ANALYST / PRODUCT ANALYTICS</text>
  <text x="128" y="186" fill="#052E2B" font-family="'Segoe UI Semibold', Arial, sans-serif" font-size="54">Kamil Bagdalov</text>
  <text x="128" y="230" fill="#335C57" font-family="'Segoe UI', Arial, sans-serif" font-size="24">Turning raw logs into metrics, decisions, and product clarity.</text>

  <g transform="translate(128 258)">
    <rect width="152" height="36" rx="18" fill="#065F46"/>
    <text x="76" y="23" text-anchor="middle" fill="white" font-family="'Segoe UI', Arial, sans-serif" font-size="15">SQL / Python</text>
  </g>

  <g transform="translate(296 258)">
    <rect width="214" height="36" rx="18" fill="#ECFDF5" stroke="#A7F3D0"/>
    <text x="107" y="23" text-anchor="middle" fill="#065F46" font-family="'Segoe UI', Arial, sans-serif" font-size="15">Metrics / Funnels / Experiments</text>
  </g>

  <g transform="translate(846 94)">
    <rect x="0" y="0" width="318" height="170" rx="24" fill="#FAFFFC" stroke="#D1FAE5"/>
    <path class="draw" d="M24 122C62 126 94 98 132 94C168 90 196 54 236 58C258 61 277 82 294 70" stroke="url(#line)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="132" cy="94" r="7" fill="#059669"/>
    <circle cx="236" cy="58" r="7" fill="#047857"/>
    <circle cx="294" cy="70" r="7" fill="#10B981"/>
    <text x="24" y="36" fill="#065F46" font-family="'Segoe UI', Arial, sans-serif" font-size="14" letter-spacing="2">FOCUS</text>
    <text x="24" y="66" fill="#052E2B" font-family="'Segoe UI Semibold', Arial, sans-serif" font-size="26">Clear metrics.</text>
    <text x="24" y="94" fill="#052E2B" font-family="'Segoe UI Semibold', Arial, sans-serif" font-size="26">Strong decisions.</text>
  </g>
</svg>
